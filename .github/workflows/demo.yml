name: Demo

on:
  push:
  pull_request:

jobs:
  demo-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run demo:offline
      - name: Validate and summarize PatchPilot proof
        run: node scripts/write-ci-summary.mjs
      - name: Upload PatchPilot run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patchpilot-demo-artifacts
          path: .tmp/demo-workspace/.patchpilot/runs/latest/
