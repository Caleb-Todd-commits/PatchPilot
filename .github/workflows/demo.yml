name: Demo

on:
  push:
  pull_request:

jobs:
  demo-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run demo:offline
      - name: Validate and summarize empty-cart proof
        run: PATCHPILOT_SUMMARY_TITLE="PatchPilot Empty Cart Demo Result" node scripts/write-ci-summary.mjs
      - name: Upload empty-cart run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patchpilot-empty-cart-artifacts
          path: .tmp/demo-workspace/.patchpilot/runs/latest/
      - run: npm run demo:offline:tax-discount-order
      - name: Validate and summarize tax-discount-order proof
        run: PATCHPILOT_SUMMARY_TITLE="PatchPilot Tax Discount Order Demo Result" node scripts/write-ci-summary.mjs
      - name: Upload tax-discount-order run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patchpilot-tax-discount-order-artifacts
          path: .tmp/demo-workspace/.patchpilot/runs/latest/
